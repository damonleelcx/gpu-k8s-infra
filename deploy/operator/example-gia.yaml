# Example: scale a GPU inference Deployment based on QPS + prediction + cold start
# Prereqs: Prometheus scraping inference QPS (e.g. inference_requests_total or similar)
apiVersion: autoscaling.gpu.k8s.infra/v1alpha1
kind: GPUInferenceAutoscaler
metadata:
  name: inference-qps
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: my-gpu-inference   # your inference Deployment
  minReplicas: 0
  maxReplicas: 10
  syncPeriodSeconds: 15
  metrics:
    - type: QPS
      targetPerReplica: 100
      # Total QPS across all pods; desired = ceil(totalQPS / 100)
      prometheusQuery: 'sum(rate(inference_requests_total{job="my-inference"}[1m]))'
  prediction:
    enable: true
    lookbackWindowSeconds: 300
    preScaleSeconds: 60
    method: exponential
  coldStart:
    estimatedStartupSeconds: 90
    warmPoolSize: 0
    scaleUpDelaySeconds: 120
---
