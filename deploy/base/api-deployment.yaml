# Production-ready GPU Platform API Deployment
# Requires: metrics-server (for HPA), NVIDIA device-plugin (for GPU nodes)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gpu-platform-api
  namespace: gpu-platform
  labels:
    app: gpu-platform-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gpu-platform-api
  template:
    metadata:
      labels:
        app: gpu-platform-api
    spec:
      serviceAccountName: gpu-platform-api
      containers:
        - name: api
          image: gpu-platform-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: GPU_JOBS_NAMESPACE
              valueFrom:
                configMapKeyRef:
                  name: gpu-platform-config
                  key: jobs_namespace
            - name: PORT
              value: "8080"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: gpu-platform-api
  namespace: gpu-platform
  labels:
    app: gpu-platform-api
spec:
  ports:
    - port: 80
      targetPort: 8080
      name: http
  selector:
    app: gpu-platform-api
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gpu-platform-config
  namespace: gpu-platform
data:
  jobs_namespace: "gpu-platform"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gpu-platform-api
  namespace: gpu-platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gpu-platform-api
  namespace: gpu-platform
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "delete", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gpu-platform-api
  namespace: gpu-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gpu-platform-api
subjects:
  - kind: ServiceAccount
    name: gpu-platform-api
    namespace: gpu-platform
